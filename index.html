<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdiMan Healthy Restaurant</title>

<style>

/* Smooth Scroll */
html{
scroll-behavior:smooth;
}

/* BODY */
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

/* NAVBAR */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#27ae60;
color:white;
position:sticky;
top:0;
z-index:1000;
}

/* SEARCH BOX */
.search-container{
position:relative;
}

#search{
padding:10px;
border:none;
border-radius:20px;
outline:none;
width:220px;
}

/* SEARCH DROPDOWN */
#suggestions{
position:absolute;
top:45px;
left:0;
background:white;
width:220px;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
z-index:999;
}

.suggestion-item{
padding:10px;
cursor:pointer;
color:black;
font-weight:bold;
}

.suggestion-item:hover{
background:#27ae60;
color:white;
}

/* LOGO */
nav h2{
margin:0;
font-size:35px;
font-weight:bold;
text-shadow:2px 2px 10px rgba(0,0,0,0.3);
}

/* NAV LINKS */
nav ul{
display:flex;
list-style:none;
gap:20px;
}

nav ul li a{
text-decoration:none;
color:white;
font-weight:bold;
}

nav ul li a:hover{
color:yellow;
}

/* HERO */
.hero{
height:90vh;
background:url('https://images.unsplash.com/photo-1490645935967-10de6ba17061?w=1600') center/cover;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

.hero-text{
background:rgba(0,0,0,0.5);
padding:30px;
border-radius:20px;
animation:fadeZoom 1.5s ease;
}

.hero h1{
font-size:50px;
animation:slideDown 1.5s ease;
}

.hero p{
font-size:22px;
color:#ffe600;
font-weight:bold;
animation:slideUp 2s ease;
}

.hero button{
padding:15px 30px;
border:none;
background:#27ae60;
color:white;
font-size:18px;
border-radius:30px;
cursor:pointer;
animation:pulse 2s infinite;
}

/* CONTAINER */
.container{
padding:50px;
text-align:center;
}

/* DISH GALLERY */
.image-gallery{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
margin-top:30px;
}

.image-gallery img{
width:300px;
height:220px;
object-fit:cover;
border-radius:15px;
transition:.4s;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.image-gallery img:hover{
transform:scale(1.08);
}

.dish-card{
text-align:center;
}

.dish-card button{
padding:10px 20px;
background:#27ae60;
color:white;
border:none;
border-radius:25px;
cursor:pointer;
}

/* ANIMATIONS */
@keyframes slideDown{
from{opacity:0;transform:translateY(-50px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes slideUp{
from{opacity:0;transform:translateY(50px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes fadeZoom{
from{opacity:0;transform:scale(0.8);}
to{opacity:1;transform:scale(1);}
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

</style>
</head>
<body>

<!-- NAVBAR -->
<nav>

<div class="search-container">
<input type="text" id="search" placeholder="Search food..." onkeyup="showSuggestions()">
<div id="suggestions"></div>
</div>

<h2>🌿 AdiMan Healthy Restaurant</h2>

<ul>
<li><a href="index.html">Home</a></li>
<li><a href="menu.html">Menu</a></li>
<li><a href="diet.html">Diet</a></li>
<li><a href="order.html">Order</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>

</nav>

<!-- HERO -->
<section class="hero">

<div class="hero-text">
<h1>Welcome to Healthy Bites</h1>
<p>Eat Healthy Stay Fit 🥗</p>

<a href="menu.html">
<button>Explore Menu</button>
</a>

</div>

</section>

<!-- SPECIAL DISHES -->
<div class="container">

<h2>Our Special Dishes</h2>

<div class="image-gallery">

<div class="dish-card">
<a href="order.html#salad">
<img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">
</a>
<h3>Fresh Green Salad</h3>
<a href="order.html#salad">
<button>Order Now</button>
</a>
</div>

<div class="dish-card">
<a href="order.html#fruit">
<img src="https://images.unsplash.com/photo-1498837167922-ddd27525d352">
</a>
<h3>Healthy Fruit Bowl</h3>
<a href="order.html#fruit">
<button>Order Now</button>
</a>
</div>

<div class="dish-card">
<a href="order.html#protein">
<img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836">
</a>
<h3>Protein Meal Plate</h3>
<a href="order.html#protein">
<button>Order Now</button>
</a>
</div>

</div>

</div>

<script>

const dishes = [
{name:"Fresh Green Salad", page:"order.html#salad"},
{name:"Healthy Fruit Bowl", page:"order.html#fruit"},
{name:"Protein Meal Plate", page:"order.html#protein"},
{name:"Pizza", page:"menu.html#pizza"},
{name:"Burger", page:"menu.html#burger"},
{name:"Pasta", page:"menu.html#pasta"},
{name:"Paneer Wrap", page:"order.html#wrap"},
{name:"Protein Pancakes", page:"order.html#pancakes"}
];

function showSuggestions(){

let input=document.getElementById("search").value.toLowerCase();

let suggestions=document.getElementById("suggestions");

suggestions.innerHTML="";

if(input===""){
return;
}

dishes.forEach(dish=>{

if(dish.name.toLowerCase().includes(input)){

let div=document.createElement("div");

div.classList.add("suggestion-item");

div.innerHTML=dish.name;

div.onclick=function(){
window.location.href=dish.page;
};

suggestions.appendChild(div);

}

});

}

</script>

</body>
</html>
